capability_shapes:
  - id: core-engineering
    skill_suffix: core-engineering
    display_suffix: Core Engineering
    kind: general
    priority: P1
    applies_to: [java, dotnet, php]
    rationale: Idiomatic language engineering, maintainability, and code review for {domain_title} code.
  - id: testing-verification
    skill_suffix: testing-verification
    display_suffix: Testing Verification
    kind: testing
    priority: P1
    applies_to: [java, dotnet, php, react, angular]
    areas: [testing]
    rationale: Design, add, review, and improve {domain_title} test coverage and verification.
  - id: migrate-any-version
    skill_suffix: migrate-any-version
    display_suffix: Migrate Any Version
    kind: migration
    priority: P1
    applies_to: [java, dotnet, php, react, angular]
    areas: [migrations, versions]
    rationale: Plan and execute {domain_title} version and toolchain migrations with verification.
  - id: security-hardening
    skill_suffix: security-hardening
    display_suffix: Security Hardening
    kind: security
    priority: P1
    applies_to: [java, dotnet, php, react, angular]
    areas: [security, testing]
    default_packs: []
    rationale: Secure implementation and review patterns for {domain_title} applications.
  - id: performance
    skill_suffix: performance
    display_suffix: Performance
    kind: diagnostic
    priority: P1
    applies_to: [react, angular]
    areas: [performance, observability]
    rationale: Diagnose and improve {domain_title} application performance and runtime behavior.
  - id: accessibility
    skill_suffix: accessibility
    display_suffix: Accessibility
    kind: review
    priority: P2
    applies_to: [react, angular]
    areas: [frontend, code-quality]
    rationale: Accessibility reviews, fixes, and verification for {domain_title} applications.

