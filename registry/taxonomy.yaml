    collections: [java]
    default_packs: [java-backend-pack]
    default_areas: [backend, code-quality]
  - id: dotnet
    title: .NET
    collections: [dotnet]
    default_packs: [dotnet-backend-pack]
    default_areas: [backend, code-quality]
  - id: php
    title: PHP
    collections: [php]
    default_packs: [php-backend-pack]
    default_areas: [backend, code-quality]
  - id: react
    title: React
    collections: [react]
    default_packs: [frontend-react-pack]
    default_areas: [frontend, code-quality]
  - id: angular
    title: Angular
    collections: [angular]
    default_packs: [frontend-angular-pack]
